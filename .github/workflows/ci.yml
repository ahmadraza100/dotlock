name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: Run linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          skip-cache: true
      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: go test -race -coverprofile=coverage-${{ matrix.os }}.out ./...

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: go test -race "-coverprofile=coverage.out" ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage-${{ matrix.os }}.out
